<!DOCTYPE html>
<html>
<head>
    <title>Student Enrollment Form</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="config.js"></script>
    <script src="jpdb-commons.js"></script>
    <script src="script.js"></script>
</head>

<body>

<h2>Student Enrollment Form</h2>

<form id="studentForm">

    Roll No: <input type="text" id="rollNo" /><br><br>

    <input type="hidden" id="recNo" />

    Full Name: <input type="text" id="fullName" /><br><br>

    Class: <input type="text" id="class" /><br><br>

    Birth Date: <input type="date" id="birthDate" /><br><br>

    Address: <input type="text" id="address" /><br><br>

    Enrollment Date: <input type="date" id="enrollDate" /><br><br>

    <button type="button" id="saveBtn">Save</button>
    <button type="button" id="updateBtn">Update</button>
    <button type="button" id="resetBtn">Reset</button>

</form>

</body>
</html>
